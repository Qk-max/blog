<!doctype html><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="assets/site.css"><main class="wrap section"><a class="button button-quiet" href="notes.html">← 返回笔记</a><article id="note"><p>正在加载笔记…</p></article></main><script>const s=new URLSearchParams(location.search).get('slug');fetch('/api/notes/'+encodeURIComponent(s)).then(r=>r.json()).then(n=>document.querySelector('#note').innerHTML=`<p class="eyebrow">${n.date}</p><h1>${n.title}</h1><p class="lede">${n.summary}</p><pre style="white-space:pre-wrap;line-height:1.9">${n.body.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}</pre>`).catch(()=>document.querySelector('#note').textContent='笔记不存在。')</script>
